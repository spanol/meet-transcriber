name: CI

# Minimal CI for a single-file static surge app.
# - validate: extract the inline `<script type="module">` from index.html and
#   run `node --check` on it, then assert the surge SPA-fallback invariant
#   (200.html byte-identical to index.html). No build step, no deps.
# - deploy:   on push to main, publish the folder to surge.
#
# Required repo config to enable deploy (set once auth is provisioned):
#   secret SURGE_TOKEN  -> a surge token (run `surge token`)
#   var    SURGE_DOMAIN -> e.g. meet-transcriber-spa.surge.sh (falls back below)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Single source of truth: the same script you can run locally with
      # `bash scripts/validate.sh`. Keeps local == CI by construction, and
      # means validation stays reproducible even when the hosted runner is
      # unavailable.
      - name: Validate (inline module node --check + surge SPA invariant)
        run: bash scripts/validate.sh

  deploy:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy to surge
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
          SURGE_DOMAIN: ${{ vars.SURGE_DOMAIN }}
        run: |
          if [ -z "$SURGE_TOKEN" ]; then
            echo "::warning::SURGE_TOKEN not set — skipping deploy. Add it in repo secrets to enable deploy-on-merge."
            exit 0
          fi
          npm i -g surge
          surge ./ "${SURGE_DOMAIN:-meet-transcriber-spa.surge.sh}" --token "$SURGE_TOKEN"
